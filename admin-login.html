<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer X Cloud - Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0a0a 0%, #4b1a1a 50%, #3d0d0d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .glowing-line {
            position: fixed;
            background: linear-gradient(90deg, transparent, #ff3333, transparent);
            animation: moveLine 8s infinite;
            opacity: 0.5;
        }

        @keyframes moveLine {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .login-box {
            background: rgba(50, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 51, 51, 0.3);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px 0 rgba(255, 51, 51, 0.2);
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
            animation: logoGlow 2s infinite;
        }

        @keyframes logoGlow {
            0%, 100% {
                text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
            }
            50% {
                text-shadow: 0 0 20px rgba(255, 51, 51, 1);
            }
        }

        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #ff3333, #ff0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .logo p {
            color: #ff3333;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 51, 51, 0.2);
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 25px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group:nth-child(2) { animation-delay: 0.1s; }
        .form-group:nth-child(3) { animation-delay: 0.2s; }
        .form-group:nth-child(4) { animation-delay: 0.3s; }

        label {
            display: block;
            color: #ff3333;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(255, 51, 51, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #ff3333;
            background: rgba(255, 51, 51, 0.1);
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.3);
        }

        .btn-login, .btn-back {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-login {
            background: linear-gradient(135deg, #ff3333, #ff0000);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 51, 51, 0.4);
            animation: buttonSlide 0.6s ease-out;
        }

        @keyframes buttonSlide {
            from {
                opacity: 0;
                transform: scaleY(0);
            }
            to {
                opacity: 1;
                transform: scaleY(1);
            }
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 51, 51, 0.6);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .btn-back {
            background: rgba(255, 51, 51, 0.2);
            color: #ff3333;
            border: 2px solid #ff3333;
            margin-top: 15px;
        }

        .btn-back:hover {
            background: rgba(255, 51, 51, 0.3);
            box-shadow: 0 4px 15px rgba(255, 51, 51, 0.3);
        }

        .error {
            color: #ff6666;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success {
            color: #00d4ff;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .info-box {
            background: rgba(255, 51, 51, 0.1);
            border-left: 4px solid #ff3333;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }

        .info-box strong {
            color: #ff3333;
        }

        @media (max-width: 600px) {
            .login-box {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="starsContainer"></div>

    <div class="container">
        <div class="login-box">
            <div class="logo">
                <h1>🔐 ADMIN ACCESS</h1>
                <p>Owner Dashboard</p>
                <span class="badge">RESTRICTED ZONE</span>
            </div>

            <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label for="adminId">Admin ID</label>
                    <input type="text" id="adminId" placeholder="Enter admin username" required>
                </div>

                <div class="form-group">
                    <label for="adminPassword">Admin Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter admin password" required>
                </div>

                <button type="submit" class="btn-login">🔓 Login as Admin</button>
                <button type="button" class="btn-back" onclick="goBackToClient()">← Back to Client Login</button>

                <div id="adminLoginError" class="error"></div>
                <div id="adminLoginSuccess" class="success"></div>
            </form>

            <div class="info-box">
                <strong>⚠️ Admin Access Only:</strong><br>
                Only authorized owners can access this section. Default admin credentials are required to manage users and system settings.
            </div>
        </div>
    </div>

    <script>
        // Initialize admin credentials
        let adminCredentials = {
            id: 'owner',
            password: 'owner@123'
        };

        // Generate random stars
        function generateStars() {
            const starsContainer = document.getElementById('starsContainer');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 2 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }

            // Add glowing lines
            for (let i = 0; i < 3; i++) {
                const line = document.createElement('div');
                line.className = 'glowing-line';
                line.style.width = '2px';
                line.style.height = '200px';
                line.style.left = Math.random() * 100 + '%';
                line.style.animationDelay = i * 2 + 's';
                starsContainer.appendChild(line);
            }
        }

        function handleAdminLogin(event) {
            event.preventDefault();
            const id = document.getElementById('adminId').value;
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('adminLoginError');
            const successDiv = document.getElementById('adminLoginSuccess');

            errorDiv.textContent = '';
            successDiv.textContent = '';

            if (id === adminCredentials.id && password === adminCredentials.password) {
                successDiv.textContent = '✓ Admin login successful! Redirecting...';
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('adminUser', id);
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 800);
            } else {
                errorDiv.textContent = '✗ Invalid admin credentials';
            }
        }

        function goBackToClient() {
            window.location.href = 'index.html';
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            generateStars();
        });
    </script>
</body>
</html>
